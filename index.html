<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘风 Joy 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #000;
            background-image: url("");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: sans-serif;
        }
        .nav-box {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 999px;
            padding: 10px 30px;
            z-index: 999;
        }
        .nav-box a {
            color: #fff;
            text-decoration: none;
            margin: 0 12px;
            padding: 5px 10px;
            transition: 0.3s;
        }
        .nav-box a.active {
            border: 1px solid #fff;
            border-radius: 6px;
        }
        .big-title {
            background: linear-gradient(90deg,#ffffff,#87bfff);
            -webkit-background-clip: text;
            color: transparent;
        }
        .wrap {
            animation: upAnim 1.5s ease-out;
        }
        @keyframes upAnim {
            from {opacity: 0;transform: translateY(40px);}
            to {opacity: 1;transform: translateY(0);}
        }
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="nav-box">
        <a href="#home" class="active">首页</a>
        <a href="#digital">数码分享</a>
        <a href="#python">Python代码</a>
        <a href="#dy">抖音主页</a>
    </div>

    <section id="home" class="wrap">
        <h1 class="big-title" style="font-size:70px;font-weight:bold;">忘风 Joy</h1>
        <p style="margin-top:20px;font-size:20px;color:#ccc;">数码干货 · Python 开源创作</p>
    </section>

    <section id="digital" class="wrap">
        <h2 class="big-title" style="font-size:40px;margin-bottom:15px;">数码分享</h2>
        <p style="font-size:18px;color:#bbb;">手机、电脑低配设备优化 实用数码技巧</p>
    </section>

    <section id="python" class="wrap">
        <h2 class="big-title" style="font-size:40px;margin-bottom:15px;">Python 代码分享</h2>
        <p style="font-size:18px;color:#bbb;">零基础趣味编程、免费开源小脚本</p>
    </section>

    <section id="dy" class="wrap">
        <h2 class="big-title" style="font-size:40px;margin-bottom:20px;">我的抖音</h2>
        <a href="https://www.douyin.com/user/MS4wLjABAAAAyH8AJAynwyOCU70Qy0iC4RKnQKw1RdS4EFhy2ey9u7Yw9t7W4RocfqHlPuemGL8D?from_tab_name=main" target="_blank" style="font-size:22px;border:1px solid #fff;padding:8px 20px;border-radius:8px;text-decoration:none;color:#fff;">点击进入我的抖音</a>
        <!-- ======================================================= -->
    </section>
</body>
</html>
